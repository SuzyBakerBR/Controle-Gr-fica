<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Diário de Serviço</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --secondary: #64748b;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --dark: #1e293b;
  --light: #f8fafc;
  --white: #ffffff;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}

/* Header */
.header {
  background: var(--white);
  border-radius: 16px;
  padding: 20px 30px;
  box-shadow: var(--shadow-lg);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 15px;
}

.logo-section {
  display: flex;
  align-items: center;
  gap: 15px;
}

.logo {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 24px;
}

/* Logo personalizado (PNG) - ajuste aqui o tamanho do seu logo */
.logo-img {
  width: 100px;
  height: 60px;
  object-fit: contain;
  border-radius: 8px;
}

.company-info h1 {
  font-size: 1.5rem;
  color: var(--dark);
  font-weight: 700;
}

.company-info p {
  color: var(--secondary);
  font-size: 0.875rem;
}

.date-section {
  text-align: right;
}

.date-section .date {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--dark);
}

.date-section .greeting {
  color: var(--secondary);
  font-size: 0.875rem;
}

/* Dashboard Cards */
.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 20px;
}

.card {
  background: var(--white);
  border-radius: 12px;
  padding: 20px;
  box-shadow: var(--shadow);
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.card-header h3 {
  font-size: 0.875rem;
  color: var(--secondary);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.card-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.card-icon.blue { background: #dbeafe; color: #2563eb; }
.card-icon.green { background: #d1fae5; color: #10b981; }
.card-icon.orange { background: #fef3c7; color: #f59e0b; }
.card-icon.red { background: #fee2e2; color: #ef4444; }

.card-value {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--dark);
}

.card-value.blue { color: #2563eb; }
.card-value.green { color: #10b981; }
.card-value.orange { color: #f59e0b; }
.card-value.red { color: #ef4444; }

/* Form Section */
.form-section {
  background: var(--white);
  border-radius: 16px;
  padding: 25px;
  box-shadow: var(--shadow-lg);
  margin-bottom: 20px;
}

.form-section h2 {
  font-size: 1.25rem;
  color: var(--dark);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.form-section h2 i {
  color: var(--primary);
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.form-group label {
  font-size: 0.875rem;
  color: var(--secondary);
  font-weight: 500;
}

.form-group input,
.form-group select {
  padding: 12px 15px;
  border: 2px solid var(--gray-200);
  border-radius: 8px;
  font-size: 0.95rem;
  font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.btn-submit {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  border: none;
  padding: 12px 30px;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: auto;
}

.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
}

/* Table Section */
.table-section {
  background: var(--white);
  border-radius: 16px;
  padding: 25px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}

.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.table-header h2 {
  font-size: 1.25rem;
  color: var(--dark);
  display: flex;
  align-items: center;
  gap: 10px;
}

.table-header h2 i {
  color: var(--primary);
}

.table-container {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: var(--gray-100);
}

th {
  padding: 15px;
  text-align: left;
  font-size: 0.75rem;
  color: var(--secondary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

td {
  padding: 15px;
  border-bottom: 1px solid var(--gray-200);
  font-size: 0.9rem;
  color: var(--dark);
}

tbody tr {
  transition: background 0.2s;
}

tbody tr:hover {
  background: var(--gray-100);
}

.status-badge {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
}

.status-aguardando {
  background: #fef3c7;
  color: #92400e;
}

.status-producao {
  background: #dbeafe;
  color: #1e40af;
}

.status-finalizado {
  background: #d1fae5;
  color: #065f46;
}

.pago-badge {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
}

.pago-sim {
  background: #d1fae5;
  color: #065f46;
}

.pago-nao {
  background: #fee2e2;
  color: #991b1b;
}

.action-buttons {
  display: flex;
  gap: 8px;
}

.btn-action {
  width: 35px;
  height: 35px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
}

.btn-action:hover {
  transform: scale(1.1);
}

.btn-edit {
  background: #dbeafe;
  color: #2563eb;
}

.btn-delete {
  background: #fee2e2;
  color: #ef4444;
}

/* Responsive */
@media (max-width: 768px) {
  .header {
    flex-direction: column;
    text-align: center;
  }
  
  .logo-section {
    flex-direction: column;
  }
  
  .date-section {
    text-align: center;
  }
  
  .form-grid {
    grid-template-columns: 1fr;
  }
  
  th, td {
    padding: 10px 8px;
    font-size: 0.8rem;
  }
}

/* Animations */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.card, .form-section, .table-section {
  animation: fadeIn 0.4s ease-out;
}

.dashboard .card:nth-child(1) { animation-delay: 0.1s; }
.dashboard .card:nth-child(2) { animation-delay: 0.15s; }
.dashboard .card:nth-child(3) { animation-delay: 0.2s; }
.dashboard .card:nth-child(4) { animation-delay: 0.25s; }
</style>
</head>
<body>

<!-- Header com Logo e Nome da Empresa -->
<header class="header">
  <div class="logo-section">
    <!-- 🏢 PARA USAR SEU LOGO PNG: -->
    <!-- 1. Coloque seu arquivo logo.png na pasta do projeto -->
    <!-- 2. Descomente a linha abaixo: -->
<img src="logo.png" alt="Logo" class="logo-img">
    
    <!-- Ícone padrão (use este se não tiver logo)
    <div class="logo">
      <i class="fas fa-print"></i>
    </div> -->
    
    <div class="company-info">
      <h1>Controle Diário de Serviço</h1>
      <p>Gestão de Produção e Pedidos</p>
    </div>
  </div>
  <div class="date-section">
    <div class="date" id="dataHoje"></div>
    <div class="greeting">Bem-vindo ao sistema</div>
  </div>
</header>

<!-- Dashboard com Cards -->
<div class="dashboard">
  <div class="card">
    <div class="card-header">
      <h3>Total de Pedidos</h3>
      <div class="card-icon blue">
        <i class="fas fa-clipboard-list"></i>
      </div>
    </div>
    <div class="card-value blue" id="totalPedidos">0</div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3>Total Recebido</h3>
      <div class="card-icon green">
        <i class="fas fa-check-circle"></i>
      </div>
    </div>
    <div class="card-value green" id="totalRecebido">R$ 0,00</div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3>Total Pendente</h3>
      <div class="card-icon orange">
        <i class="fas fa-clock"></i>
      </div>
    </div>
    <div class="card-value orange" id="totalPendente">R$ 0,00</div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3>Total Geral</h3>
      <div class="card-icon red">
        <i class="fas fa-chart-line"></i>
      </div>
    </div>
    <div class="card-value red" id="totalGeral">R$ 0,00</div>
  </div>
</div>

<!-- Formulário de Cadastro -->
<section class="form-section">
  <h2><i class="fas fa-plus-circle"></i> Novo Pedido</h2>
  <form id="formPedido" class="form-grid">
    <div class="form-group">
      <label for="cliente">Cliente</label>
      <input type="text" id="cliente" placeholder="Nome do cliente" required>
    </div>
    <div class="form-group">
      <label for="servico">Serviço</label>
      <input type="text" id="servico" placeholder="Descrição do serviço" required>
    </div>
    <div class="form-group">
      <label for="valorServicos">Valor Total (R$)</label>
      <input type="number" id="valorServicos" placeholder="0,00" step="0.01" required>
    </div>
    <div class="form-group">
      <label for="entrada">Entrada (R$)</label>
      <input type="number" id="entrada" placeholder="0,00" step="0.01">
    </div>
    <div class="form-group">
      <label for="status">Status</label>
      <select id="status">
        <option value="aguardando">Aguardando</option>
        <option value="producao">Em Produção</option>
        <option value="finalizado">Finalizado</option>
      </select>
    </div>
    <div class="form-group">
      <label for="pago">Pago</label>
      <select id="pago">
        <option value="nao">Não Pago</option>
        <option value="sim">Pago</option>
      </select>
    </div>
    <div class="form-group" style="margin-top: auto;">
      <button type="submit" class="btn-submit">
        <i class="fas fa-plus"></i> Adicionar
      </button>
    </div>
  </form>
</section>

<!-- Tabela de Pedidos -->
<section class="table-section">
  <div class="table-header">
    <h2><i class="fas fa-list"></i> Pedidos</h2>
  </div>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Cliente</th>
          <th>Serviço</th>
          <th>Valor Total</th>
          <th>Entrada</th>
          <th>Restante</th>
          <th>Status</th>
          <th>Pago</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaPedidos">
      </tbody>
    </table>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
